name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Remove the existing git history to clear "bad" binary commits
          rm -rf .git
          
          # 2. Re-initialize a fresh git repo
          git init
          git config user.name "Kamazing"
          git config user.email "Kamazing@users.noreply.github.com"
          
          # 3. Add all files (the .gitattributes will now handle images correctly)
          git add .
          git commit -m "Fresh sync with binary fix"
          
          # 4. Force push this "clean" version to HF
          git push --force https://Kamazing:$HF_TOKEN@huggingface.co/spaces/Kamazing/MrMaower main
