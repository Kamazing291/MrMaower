name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Wipe history
          rm -rf .git
          
          # 2. Re-initialize and FORCE the branch name to 'main'
          git init -b main
          git config user.name "Kamazing291"
          git config user.email "Kamazing291@users.noreply.github.com"
          
          # 3. Add files
          git add .
          git commit -m "Fresh sync fix for binary files"
          
          # 4. Push to HF
          git push --force https://Kamazing:$HF_TOKEN@huggingface.co/spaces/Kamazing/MrMaower main
