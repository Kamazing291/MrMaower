name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Wipe the history to remove the "binary file" block
          rm -rf .git
          
          # 2. Re-initialize as a clean repo
          git init
          git config user.name "Kamazing291"
          git config user.email "Kamazing291@users.noreply.github.com"
          
          # 3. Add all files (including the .gitattributes)
          git add .
          git commit -m "Fresh sync fix for binary files"
          
          # 4. Force push to Hugging Face
          git push --force https://Kamazing:$HF_TOKEN@huggingface.co/spaces/Kamazing/MrMaower main
